site_name: Projeto F1
site_description: Pipeline de dados de Fórmula 1 via OpenF1 API
site_author: Luis Fernando
repo_url: https://github.com/luisfernando/projeto-f1
repo_name: projeto-f1

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Início: index.md
  - Guia de uso:
      - Instalação: guia/instalacao.md
      - Configuração: guia/configuracao.md
      - Executando: guia/executando.md
  - API:
      - Modelos: api/modelos.md
      - Ingestão: api/ingestao.md
  - Tarefas: tarefas.md
